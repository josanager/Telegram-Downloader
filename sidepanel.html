<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misil Downloader</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
            --bg: #0c111b;
            --surface: #161d2e;
            --surface-hover: #1e2740;
            --border: rgba(255,255,255,0.06);
            --primary: #FF3737;
            --primary-glow: rgba(255,55,55,0.25);
            --green: #22c55e;
            --text: #f1f5f9;
            --text-muted: #64748b;
            --radius: 14px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .hidden { display: none !important; }

        /* ── HEADER ── */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
        }
        .header img { width: 38px; height: 38px; }
        .header-info .title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
        .badge {
            display: inline-block;
            font-size: 9px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-top: 3px;
            background: rgba(255,255,255,0.08);
            color: var(--text-muted);
        }
        .badge.on { background: var(--primary-glow); color: var(--primary); }

        /* ── AUTH VIEW ── */
        #auth-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .auth-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 22px;
        }
        .auth-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.25);
            border-radius: 10px;
            padding: 3px;
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.25s;
        }
        .auth-tab.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 12px var(--primary-glow);
        }
        .auth-desc {
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 22px;
        }
        .auth-desc strong { color: white; }
        .field {
            position: relative;
            margin-bottom: 14px;
        }
        .field input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            color: white;
            padding: 13px 14px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .field input:focus { outline: none; border-color: var(--primary); }
        .field input::placeholder { color: var(--text-muted); }
        .auth-error {
            text-align: center;
            font-size: 12px;
            color: var(--primary);
            min-height: 16px;
            margin-bottom: 14px;
            font-weight: 500;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: var(--primary);
            color: white;
            font-family: inherit;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .btn-primary:hover { box-shadow: 0 4px 20px var(--primary-glow); }
        .btn-primary:active { transform: scale(0.97); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* ── DASHBOARD ── */
        #dashboard-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* Quota */
        .quota-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .ring-wrap { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
        .ring-wrap svg { transform: rotate(-90deg); }
        .ring-wrap circle { fill: none; stroke-linecap: round; }
        .ring-bg { stroke: rgba(255,255,255,0.05); stroke-width: 7; }
        .ring-fill { stroke: var(--primary); stroke-width: 7; transition: stroke-dashoffset 0.6s ease; }
        .ring-label {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        .ring-val { font-size: 22px; font-weight: 800; display: block; line-height: 1; }
        .ring-sub { font-size: 9px; color: var(--text-muted); font-weight: 500; }
        .quota-text { flex: 1; }
        .quota-text .qt-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
        .quota-text .qt-sub { font-size: 12px; color: var(--text-muted); line-height: 1.4; }

        /* Tab Switcher */
        .tab-bar {
            display: flex;
            gap: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 3px;
        }
        .tab-btn {
            flex: 1;
            text-align: center;
            padding: 9px 0;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.25s;
        }
        .tab-btn.active {
            background: rgba(255,255,255,0.08);
            color: white;
        }

        /* Content Panels */
        .tab-content {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px;
            flex: 1;
            overflow-y: auto;
            max-height: 400px;
        }
        .tab-content::-webkit-scrollbar { width: 3px; }
        .tab-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

        .section-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .section-title svg { width: 14px; height: 14px; fill: var(--text-muted); }

        /* History Items */
        .h-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        .h-item:last-child { border-bottom: none; }
        .h-icon {
            width: 34px; height: 34px;
            border-radius: 8px;
            background: rgba(255,55,55,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .h-icon svg { width: 16px; height: 16px; fill: var(--primary); }
        .h-info { flex: 1; min-width: 0; }
        .h-name {
            font-size: 12px; font-weight: 500;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .h-date { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

        /* Media Items */
        .m-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        .m-item:last-child { border-bottom: none; }
        .m-thumb {
            width: 50px; height: 36px;
            border-radius: 6px;
            background: rgba(255,255,255,0.05);
            overflow: hidden;
            flex-shrink: 0;
            position: relative;
        }
        .m-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .m-thumb .play-badge {
            position: absolute;
            bottom: 2px; right: 2px;
            background: rgba(0,0,0,0.7);
            color: white;
            font-size: 8px;
            padding: 1px 4px;
            border-radius: 3px;
            font-weight: 600;
        }
        .m-info { flex: 1; min-width: 0; }
        .m-name {
            font-size: 12px; font-weight: 500;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .m-size { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
        .m-dl-btn {
            width: 32px; height: 32px;
            border-radius: 8px;
            background: var(--primary);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .m-dl-btn:hover { box-shadow: 0 2px 10px var(--primary-glow); }
        .m-dl-btn:active { transform: scale(0.9); }
        .m-dl-btn svg { width: 16px; height: 16px; fill: white; }

        .empty {
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
            padding: 30px 0;
            line-height: 1.6;
        }

        .logout-btn {
            width: 100%;
            padding: 10px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .logout-btn:hover { color: white; border-color: rgba(255,255,255,0.15); }
    </style>
</head>
    <canvas id="particles-bg" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.5; pointer-events: none;"></canvas>

    <!-- HEADER (only tag) -->
    <div class="header" style="border-bottom: none; justify-content: flex-start; margin-bottom: 0;">
        <span class="badge" id="plan-tag" style="margin-left: -6px; padding: 4px 10px; font-size: 10px; border-radius: 8px;">Desconectado</span>
    </div>

    <!-- AUTH VIEW -->
    <div id="auth-view" class="hidden">
        <div class="auth-card">
            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-login">Entrar</div>
                <div class="auth-tab" id="tab-register">Crear Cuenta</div>
            </div>
            <div class="auth-desc">
                Activa tus <strong>100 descargas gratuitas</strong> al mes.
            </div>
            <div class="field">
                <input type="text" id="auth-user" placeholder="Tu nombre de usuario">
            </div>
            <div class="field">
                <input type="password" id="auth-pass" placeholder="Contraseña">
            </div>
            <div class="auth-error" id="auth-error"></div>
            <button class="btn-primary" id="auth-submit-btn">Entrar</button>
        </div>
    </div>

    <!-- DASHBOARD VIEW -->
    <div id="dashboard-view" class="hidden">

        <!-- Quota Card -->
        <div class="quota-card">
            <div class="ring-wrap">
                <svg width="80" height="80">
                    <circle class="ring-bg" cx="40" cy="40" r="34"></circle>
                    <circle class="ring-fill" cx="40" cy="40" r="34"
                            stroke-dasharray="213.6" stroke-dashoffset="213.6"
                            id="circle-fill"></circle>
                </svg>
                <div class="ring-label">
                    <span class="ring-val" id="current-count">0</span>
                    <span class="ring-sub">de 100</span>
                </div>
            </div>
            <div class="quota-text">
                <div class="qt-title">Descargas</div>
                <div class="qt-sub">Te quedan <strong id="remaining-count" style="color:white">100</strong> este mes</div>
            </div>
        </div>


        <!-- Media Tab -->
        <div class="tab-content" id="panel-media" style="margin-top: 14px;">
            <div class="section-title">
                <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
                Multimedia Detectada
            </div>
            <div id="media-list">
                <div class="empty" id="media-empty">
                    <div style="font-size:28px;margin-bottom:12px;">🎬</div>
                    Haz clic en el ícono rojo de Misil<br>que aparece en cualquier foto o video<br>de Telegram para descargarlo.
                </div>
            </div>
        </div>


        <button class="logout-btn" id="logout-btn" style="margin-top: 14px;">Cerrar Sesión</button>
    </div>

    <script src="supabase-client.js"></script>
    <script src="sidepanel.js"></script>
</body>
</html>
