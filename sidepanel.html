<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misil - Telegram Downloader</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #FF3737;
            --accent: #10b981;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 100vh;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            width: 40px;
            height: 40px;
        }

        .title {
            font-size: 18px;
            font-weight: 700;
        }

        .status-badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(255, 55, 55, 0.2);
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .quota-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 15px;
        }

        .progress-circle {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .progress-circle svg {
            transform: rotate(-90deg);
        }

        .progress-circle circle {
            fill: none;
            stroke-width: 8;
            stroke-linecap: round;
        }

        .progress-bg {
            stroke: rgba(255, 255, 255, 0.05);
        }

        .progress-fill {
            stroke: var(--primary);
            transition: stroke-dashoffset 0.5s ease;
        }

        .counter-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .count-val {
            font-size: 24px;
            font-weight: 700;
            display: block;
        }

        .count-label {
            font-size: 10px;
            color: var(--text-muted);
        }

        /* History Section */
        .history-title {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .history-list::-webkit-scrollbar {
            width: 4px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 12px;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: rgba(255, 55, 55, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .history-icon svg {
            width: 16px;
            height: 16px;
            fill: var(--primary);
        }

        .history-info {
            flex: 1;
            min-width: 0;
        }

        .history-name {
            color: var(--text);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-date {
            color: var(--text-muted);
            font-size: 10px;
            margin-top: 2px;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            padding: 20px 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="icons/icon128.png" class="logo-img" alt="Logo">
        <div>
            <div class="title">Misil Downloader</div>
            <span class="status-badge" id="plan-tag">Activa</span>
        </div>
    </div>

    <div class="glass-card quota-section">
        <div class="progress-circle">
            <svg width="120" height="120">
                <circle class="progress-bg" cx="60" cy="60" r="54"></circle>
                <circle class="progress-fill" cx="60" cy="60" r="54" stroke-dasharray="339.29" stroke-dashoffset="339.29" id="circle-fill"></circle>
            </svg>
            <div class="counter-text">
                <span class="count-val" id="current-count">0</span>
                <span class="count-label">/100 este mes</span>
            </div>
        </div>
        <div style="font-size: 14px; color: var(--text-muted);">
            Te quedan <span id="remaining-count" style="color:white; font-weight:bold">100</span> descargas.
        </div>
    </div>

    <div class="glass-card">
        <div class="history-title">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
            Historial de Descargas
        </div>
        <ul class="history-list" id="history-list">
            <li class="empty-state" id="empty-state">Aún no hay descargas</li>
        </ul>
    </div>

    <script src="sidepanel.js"></script>
</body>
</html>
